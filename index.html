<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Seasonal Recipes</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" href="./css/index.css">

        <!-- Font Awesome CSS Link -->
        <link rel="stylesheet" href="css/fontawesome-free-7.2.0-web/css/all.css">
    </head>
    <body>
    <header class="navbar">
        <div class="container navbar-inner">
            <div class="navbar-left">
            🌱 <span class="brand">HarvestHelper</span>
            </div>
        </div>
    </header>

    <header class="hero">
      <div class="container">
        <h1 class="hero-title">Seasonal Recipes</h1>
        <p class="hero-subtitle">
            Select your state + season to see what fresh produce is available and to get recipes
        </p>
      </div>
    </header>

<main class="page">
    <section class="ui-card">

    <div id="top-header">
        <div class="logo-area">
            <b>&#127793; Harvest</b>
        </div>
    </div>
    <div class="dropdowns">
        <div class="states-select">
            <label for="states-select">Select a state:</label>
        <select name="states" id="states-select" onchange="selectProduce()">
	        <option value="AL">Alabama</option>
	        <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <option value="CO">Colorado</option>
            <option value="CT">Connecticut</option>
            <option value="DE">Delaware</option>
            <option value="DC">District Of Columbia</option>
            <option value="FL">Florida</option>
            <option value="GA">Georgia</option>
            <option value="HI">Hawaii</option>
            <option value="ID">Idaho</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="IA">Iowa</option>
            <option value="KS">Kansas</option>
            <option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option>
            <option value="ME">Maine</option>
            <option value="MD">Maryland</option>
            <option value="MA">Massachusetts</option>
            <option value="MI">Michigan</option>
            <option value="MN">Minnesota</option>
            <option value="MS">Mississippi</option>
            <option value="MO">Missouri</option>
            <option value="MT">Montana</option>
            <option value="NE">Nebraska</option>
            <option value="NV">Nevada</option>
            <option value="NH">New Hampshire</option>
            <option value="NJ">New Jersey</option>
            <option value="NM">New Mexico</option>
            <option value="NY">New York</option>
            <option value="NC">North Carolina</option>
            <option value="ND">North Dakota</option>
            <option value="OH">Ohio</option>
            <option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option>
            <option value="PA">Pennsylvania</option>
            <option value="RI">Rhode Island</option>
            <option value="SC">South Carolina</option>
            <option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option>
            <option value="TX">Texas</option>
            <option value="UT">Utah</option>
            <option value="VT">Vermont</option>
            <option value="VA">Virginia</option>
            <option value="WA">Washington</option>
            <option value="WV">West Virginia</option>
            <option value="WI">Wisconsin</option>
            <option value="WY">Wyoming</option>
        </select>
        </div>
        <div class="seasons-select">
        <label for="seasons-select">Select a season:</label>
        <select name="seasons" id="seasons-select" onchange="selectProduce()">
            <option value="spring">Spring</option>
            <option value="summer">Summer</option>
            <option value="fall">Fall</option>
            <option value="winter">Winter</option>
        </select>
        </div>
    
    </div>

    <div class="section-header">
        <h2 class="section-title">Available Produce</h2>
        <span class="count-pill" id="produceCount">—</span>
    </div> 

        
        <div class="slider-container">
            <button class="prev-btn" aria-label="Previous"><i class="fa-solid fa-angle-left"></i></button>
            
            
            <div class="slider">

            </div>

            <button class="next-btn"><i class="fa-solid fa-angle-right"></i></button>
        </div>
        <div class="section-header">
            <h2 class="section-title">Suggested Recipes</h2>
            <span class="count-pill" id="recipeCount">0 recipes</span>
        </div>

       
        <div class="recipe-grid" id="pageRecipeGrid"></div>

        </main>



      
        <!-- produce modal -->
        <dialog id="produceModal" class="produce-modal">
        <button class="modal-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>

        <!-- HERO -->
        <div class="produce-modal-hero">
            <img id="modalImage" class="produce-modal-image" alt="">
            <div class="produce-modal-hero-overlay"></div>

            <div class="produce-modal-hero-text">
            <h2 id="modalTitle" class="produce-modal-title"></h2>
            <span class="produce-modal-pill" id="modalSeasonPill" style="display:none;"></span>
            </div>
        </div>

        <!-- BODY -->
        <div class="produce-modal-body">
            <div class="section-header">
            <h3 class="section-title">Recipes</h3>
            <span class="count-pill" id="modalRecipeCount">—</span>
            </div>

            <div id="modalRecipeGrid" class="recipe-grid"></div>
        </div>
        </dialog>

    

        <!-- recipe modal -->
        <dialog id="recipeModal" class="recipe-modal">
        <button class="recipe-modal-close" aria-label="Close recipe modal">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <!-- Hero image -->
        <div class="recipe-modal-hero">
            <img id="recipeModalImage" class="recipe-modal-image" alt="">
            <div class="recipe-modal-hero-overlay"></div>
        </div>

        <!-- Content -->
        <div class="recipe-modal-body">
            <h2 id="recipeModalTitle" class="recipe-modal-title"></h2>

            <p id="recipeModalDesc" class="recipe-modal-desc" style="display:none;"></p>

            <div id="recipeModalTags" class="recipe-modal-tags" style="display:none;"></div>

            <div class="recipe-modal-pills">
            <div class="recipe-pill" id="recipeModalTime" style="display:none;">⏱ —</div>
            <div class="recipe-pill" id="recipeModalDifficulty" style="display:none;">👩‍🍳 —</div>
            <div class="recipe-pill" id="recipeModalServings" style="display:none;">👥 —</div>
            </div>

            <a id="recipeModalLink" class="recipe-modal-link" href="#" target="_blank" rel="noopener" style="display:none;">
            View full recipe
            </a>

            <div class="recipe-modal-section">
            <h3 class="recipe-modal-h3">Ingredients</h3>
            <ul id="recipeModalIngredients" class="recipe-modal-list"></ul>
            </div>

            <div class="recipe-modal-section">
            <h3 class="recipe-modal-h3">Instructions</h3>
            <ol id="recipeModalSteps" class="recipe-modal-steps"></ol>
            </div>
        </div>
        </dialog>



        <!-- Recipes added via JavaScript -->
    

        <script src="js/index.js"></script>
        <script src="js/fetch_spoonacular.js"></script>
        </body>
</html>
